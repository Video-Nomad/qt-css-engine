name: PR Check

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.14'

jobs:
  checks:
    runs-on: ubuntu-latest
    name: Ruff & Pyright Check
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v8.1.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          uv sync --group dev
          uv pip install ruff basedpyright

      - name: Run Ruff Format Check
        id: ruff_format
        continue-on-error: true
        run: |
          uv run ruff format --check --diff . 2>&1 | tee format_output.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::error::Ruff format check failed"
            exit 1
          fi

      - name: Run Ruff Lint Check
        id: ruff_lint
        continue-on-error: true
        run: |
          uv run ruff check --output-format=full . 2>&1 | tee lint_output.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::error::Ruff lint check failed"
            exit 1
          fi

      - name: Run Basedpyright Check
        id: pyright
        continue-on-error: true
        run: |
          uv run basedpyright . 2>&1 | tee pyright_output.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::error::Basedpyright check failed"
            exit 1
          fi

      - name: Prepare Artifacts
        if: always()
        run: |
          echo "${{ github.event.pull_request.number }}" > pr_number.txt

          FORMAT_FAILED="${{ steps.ruff_format.outcome }}"
          LINT_FAILED="${{ steps.ruff_lint.outcome }}"
          PYRIGHT_FAILED="${{ steps.pyright.outcome }}"

          if [ "$FORMAT_FAILED" = "failure" ] || [ "$LINT_FAILED" = "failure" ] || [ "$PYRIGHT_FAILED" = "failure" ]; then
            {
              echo "## ❌ PR Check Failed"
              echo ""
              echo "Code quality checks did not pass. Review and fix the issues below:"
              echo ""

              if [ "$FORMAT_FAILED" = "failure" ] && [ -s format_output.txt ]; then
                echo "### 📝 Format Issues"
                echo ""
                echo '```diff'
                cat format_output.txt
                echo '```'
                echo ""
                echo "**Fix:** Run \`ruff format .\`"
                echo ""
              fi

              if [ "$LINT_FAILED" = "failure" ] && [ -s lint_output.txt ]; then
                echo "### 🔍 Lint Issues"
                echo ""
                echo '```text'
                cat lint_output.txt
                echo '```'
                echo ""
                echo "**Fix:** Run \`ruff check --fix .\`"
                echo ""
              fi

              if [ "$PYRIGHT_FAILED" = "failure" ] && [ -s pyright_output.txt ]; then
                echo "### 🔬 Type Check Issues"
                echo ""
                echo '```text'
                cat pyright_output.txt
                echo '```'
                echo ""
                echo "**Fix:** Resolve type errors reported by basedpyright."
                echo ""
              fi

              echo "---"
              echo "Please commit the fixes and push to this PR branch."
            } > comment.txt
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-metadata
          path: |
            pr_number.txt
            comment.txt
          retention-days: 1

      - name: Fail if checks failed
        if: >
          steps.ruff_format.outcome == 'failure' || steps.ruff_lint.outcome ==
          'failure' || steps.pyright.outcome == 'failure'
        run: |
          echo "One or more checks failed."
          exit 1
